<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - Digibuy</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Digibuy</a>
      <nav class="nav">
        <a href="/products">Products</a>
        <a href="/cart">Cart (<span id="cartCount">0</span>)</a>
        <a href="/account-orders" id="linkOrders" style="display:none">My Orders</a>
        <a href="/login" id="linkLogin">Login</a>
        <a href="/register" id="linkRegister">Register</a>
        <button class="link" id="btnLogout" style="display:none">Logout</button>
      </nav>
    </header>

    <main class="container">
      <h2 class="page-title">Login</h2>

      <form id="loginForm" class="panel" autocomplete="off">
        <label>
          Email
          <input name="email" type="email" required placeholder="you@example.com" />
        </label>
        <label>
          Password
          <input name="password" type="password" required minlength="6" placeholder="••••••" />
        </label>
        <button class="button" type="submit">Login</button>
        <div id="msg" class="msg" aria-live="polite"></div>
      </form>
    </main>

    <footer class="footer">Demo e-commerce with Express + vanilla JS</footer>

    <script type="module" src="/js/auth-ui.js"></script>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
